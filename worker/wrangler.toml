name = "rebridge-api"
main = "worker.js"
compatibility_date = "2025-06-01"

# deploy 時に rebridge-api.tamjump.com を自動作成（DNS手動設定 不要）
routes = [
  { pattern = "rebridge-api.tamjump.com", custom_domain = true }
]

[vars]
# Resend で認証済みの送信元に合わせる（tamjump.com が認証済みならこのままでOK）
FROM_EMAIL = "Re-Bridge <noreply@tamjump.com>"

# D1（必須）── JIN作業: `npx wrangler d1 create rebridge` で出た database_id を下に貼る
[[d1_databases]]
binding = "DB"
database_name = "rebridge"
database_id = "PASTE_DATABASE_ID_HERE"
