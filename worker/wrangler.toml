name = "rebridge-api"
main = "worker.js"
compatibility_date = "2025-06-01"

# これで deploy 時に rebridge-api.tamjump.com を自動作成（tamjump.com が同一Cloudflareアカウントにあるため）
routes = [
  { pattern = "rebridge-api.tamjump.com", custom_domain = true }
]

# wrangler d1 create rebridge で出た database_id をここに貼る
[[d1_databases]]
binding = "DB"
database_name = "rebridge"
database_id = "<PASTE_D1_DATABASE_ID>"

# 任意：メール通知（Resend）
#   npx wrangler secret put RESEND_API_KEY
#   npx wrangler secret put NOTIFY_TO
